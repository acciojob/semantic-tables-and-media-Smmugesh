<!DOCTYPE html>

<html>

<head>
	
	 <title>Semantic Tables and Media</title>
	 
</head>

<body>
	  <table border="1">
    <thead>
      <tr>
        <th>Roll Number</th>
        <th>Name</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>1</td>
        <td>John</td>
      </tr>

      <tr>
        <td>2</td>
        <td>Alice</td>
      </tr>

      <tr>
        <td>3</td>
        <td>Bob</td>
      </tr>
    </tbody>
  </table>

  <!-- Heading -->
  <h2>List of medias</h2>

  <!-- Ordered List -->
  <ol>
    <!-- First Item: Image -->
    <li>
      <img
        src="https://picsum.photos/id/123/200/300"
        alt="Random image"
      />
    </li>

    <!-- Second Item: Video -->
    <li>
      <video width="320" height="240" controls>
        <source
          src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
          type="video/mp4"
        />
      </video>
    </li>

    <!-- Third Item: Audio -->
    <li>
      <audio controls>
        <source
          src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg"
          type="audio/ogg"
        />
      </audio>
    </li>
  </ol>


</body>

</html>
