<!DOCTYPE html>

<html>

<head>
	
	 <title>Semantic Tables and Media</title>
	 
</head>

<body>
	  <table border="1">

        <thead>
            <tr>
                <th>Roll Number</th>
                <th>Name</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>101</td>
                <td>Ritesh</td>
            </tr>

            <tr>
                <td>102</td>
                <td>Mugesh</td>
            </tr>

            <tr>
                <td>103</td>
                <td>Rahul</td>
            </tr>
        </tbody>

    </table>

    <!-- Heading -->
    <h2>List of medias</h2>

    <!-- Ordered List -->
    <ol>

        <!-- Image -->
        <li>
            <img 
                src="https://picsum.photos/id/123/200/300" 
                alt="Random scenic image"
            >
        </li>

        <!-- Video -->
        <li>
            <video controls width="300">
                <source 
                    src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
                    type="video/mp4"
                >
            </video>
        </li>

        <!-- Audio -->
        <li>
            <audio controls>
                <source 
                    src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" 
                    type="audio/ogg"
                >
            </audio>
        </li>

    </ol>


</body>

</html>
