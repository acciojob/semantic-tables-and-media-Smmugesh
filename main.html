<!DOCTYPE html>

<html>

<head>
	
	 <title>Semantic Tables and Media</title>
	 
</head>

<body>
	     <table border="1">
    <thead>
      <tr>
        <th>Roll numbers</th>
        <th>Names</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>1</td>
        <td>Ritesh</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Rahul</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Priya</td>
      </tr>
    </tbody>
  </table>

  <h2>List of medias</h2>

 
  <ol>
    
    <li>
      <img 
        src="https://picsum.photos/id/123/200/300" 
        alt="Random placeholder Image"
      >
    </li>

    <li>
      <video controls>
        <source 
          src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
          type="video/mp4"
        >
		  your browser does not support the video tag.
      </video>
    </li>

    <li>
      <audio controls>
        <source 
          src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" 
          type="audio/ogg"
        >
		  Your browser does not support the audio tag.
      </audio>
    </li>
  </ol>
</body>

</html>
