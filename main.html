<!DOCTYPE html>

<html>

<head>
	
	 <title>Semantic Tables and Media</title>
	 
</head>

<body>
	   <table border="1">
    <thead>
      <tr>
        <th>Roll Number</th>
        <th>Name</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>101</td>
        <td>Rohan</td>
      </tr>
      <tr>
        <td>102</td>
        <td>Priya</td>
      </tr>
      <tr>
        <td>103</td>
        <td>Aman</td>
      </tr>
    </tbody>
  </table>

  <!-- Heading -->
  <h2>List of medias</h2>

  <!-- Ordered List -->
  <ol>
    <li>
      <img 
        src="https://picsum.photos/id/123/200/300" 
        alt="Random Image"
      />
    </li>

    <li>
      <video controls width="320">
        <source 
          src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" 
          type="video/mp4"
        />
      </video>
    </li>

    <li>
      <audio controls>
        <source 
          src="http://commondatastorage.googleapis.com/codeskulptor-assets/Epoq-Lepidoptera.ogg" 
          type="audio/ogg"
        />
      </audio>
    </li>
  </ol>
  <!-- Heading -->
  
   

</body>

</html>
